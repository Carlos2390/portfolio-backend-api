services:
  database:
    image: "postgres:17.7-alpine3.23"
    environment:
      - POSTGRES_USER=local_user
      - POSTGRES_PASSWORD=local_password
      - POSTGRES_DB=local_db
    ports:
      - "54321:5432"
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
        - DATABASE_JDBC_URL=jdbc:postgresql://database:5432/local_db
        - POSTGRES_USER=local_user
        - POSTGRES_PASSWORD=local_password
        - SPRING_JPA_SHOW_SQL=true
        - API_SECURITY_TOKEN_SECRET=secret-key
    ports:
      - "8080:8080"
    depends_on:
      - database